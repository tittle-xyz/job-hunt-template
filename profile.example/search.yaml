# What you're looking for. This drives job ingestion.
#
#     make ingest            (or: python scripts/ingest_jobs.py)
#
# The defaults point at platform and infrastructure engineering, on purpose. It's
# the work this tool was built during, it's a good corner of the industry to be
# in, and a default is the strongest recommendation a template gets to make. Take
# the nudge or don't — it's a nudge, not a constraint. Every line here is yours to
# change, and the locations below are certainly wrong for you.
#
# Unlike the resume generator, ingestion falls back to this example when you
# have no profile/ yet, so a fresh clone can fetch real jobs immediately. The
# blast radius is a handful of irrelevant rows in a local SQLite file, which is
# a fair trade for working out of the box. (Generating a *resume* from example
# data is a different matter — you might send it — so that errors instead.)

# The filter. A job is kept only if its TITLE mentions one of these.
#
# Not its description, and not its tags — both were measured letting through far
# more noise than signal, because they describe what a team uses rather than what
# the job is. search_config.wanted() has the numbers. Matching is
# case-insensitive and word-boundary aware, so 'aws' does not match 'laws'.
#
# Because matching is on titles, this list has to contain the words that appear
# in the titles you want — not just the technologies you know. That distinction
# bites: a list of infrastructure tools like the one below will happily reject a
# posting titled "Senior Software Engineer" that is, in fact, an infrastructure
# job. Applied to one real 1,877-job database, this filter cut 76% of the rows as
# noise, and a handful of genuine backend/infra roles went with them purely
# because their titles said "Software Engineer".
#
# So: add the titles you'd accept, not only the tools you'd use. If you'd take a
# backend role, put 'software engineer' in here and tolerate the extra volume.
#
# This is the single biggest lever on what lands in your database.
keywords:
  # Platform and infrastructure roles — what this default is pointed at.
  - platform engineer
  - platform team
  - infrastructure
  - devops
  - sre
  - site reliability
  - reliability
  - cloud engineer

  # The tools. These catch roles whose titles name the stack instead of the
  # discipline ("Engineer, Kubernetes").
  - kubernetes
  - k8s
  - terraform
  - aws
  - docker
  - ci/cd
  - cicd

  # Uncomment to widen to general software roles.
  #
  # Worth understanding before you do. On one real 1,877-job database this single
  # line took matches from 24% to 37% — 244 more jobs. It surfaced a "Software
  # Engineer, Platform" role that was otherwise invisible, and also every iOS and
  # full-stack posting on the board. Backend and infra work is often posted under
  # a plain "Software Engineer" title, so if you'd take those roles you need this;
  # just expect to do more triage.
  #
  # - software engineer
  # - backend engineer

# What to type into a search box. Only some sources need this — the feed-based
# ones just hand us everything and let `keywords` above do the filtering.
#
# Keep this list tight. Sources that take queries get hit once per query (and
# for some, once per query per location), so doubling this list doubles the
# requests. A few well-chosen terms beat an exhaustive list that gets you
# rate-limited.
queries:
  - platform engineer
  - infrastructure engineer
  - devops
  - sre
  - site reliability engineer

# Where. Used only by location-aware sources; the remote-first boards ignore it.
# Leave empty for remote-only searching.
locations:
  - Colorado
  - Denver

# Which sources to fetch from. Comment out what you don't want.
#
# Most are global remote boards. Three are not, and are the first thing to
# change if you're not a US infrastructure engineer:
#   builtinco  — Built In Colorado. Colorado only. Useless elsewhere.
#   usajobs    — US federal government. US only, needs an API key.
#   adzuna     — global, but its value here is location search; needs an API key.
#
# Sources needing API keys are skipped with a note if the key is absent, so it
# is safe to leave them enabled. See .env.example.
sources:
  - remoteok       # remote tech jobs, no auth
  - hn             # Hacker News "Who's Hiring", monthly thread, no auth
  - hn_jobs        # Hacker News job posts, no auth
  - wwr            # We Work Remotely, RSS, no auth
  - remotive       # remote jobs, no auth
  - workingnomads  # remote jobs, no auth
  - himalayas      # remote jobs, no auth
  - jobicy         # remote jobs, no auth
  - ashby          # Ashby-hosted boards, no auth
  - linkedin       # scraped; brittle by nature, be gentle with it
  - builtinco      # Colorado only
  - usajobs        # US federal, needs API key
  - adzuna         # needs API key
  - findwork       # needs API key

# A couple of sources need more than keywords and queries.
source_options:
  wwr:
    # We Work Remotely publishes one RSS feed per category, and the category is a
    # useful pre-filter: the devops feed returns ~19 relevant jobs where the
    # all-categories feed returns ~12, since its newest 100 are mostly other
    # disciplines. Browse https://weworkremotely.com/categories for the rest —
    # e.g. remote-design-jobs, remote-product-jobs, remote-programming-jobs.
    category: remote-devops-sysadmin-jobs

  ashby:
    # This source doesn't search — it asks named companies directly, so the list
    # IS the search. Empty list means the source skips itself.
    #
    # The default is a starter set of tech companies known to use Ashby and to
    # hire platform/infrastructure people. It's a starting point, not a
    # recommendation about any specific employer — prune it to the places you'd
    # actually work, and add your own. Find more at https://www.ashbyhq.com/customers
    # (the slug is the company's ashbyhq.com URL segment).
    companies:
      # AI/ML
      - roboflow
      - openai
      - cursor
      - replicate
      - anyscale
      - runway
      - pinecone
      - weaviate
      - harvey
      - suno
      - replit
      - lumaai
      # Developer tools
      - modal
      - notion
      - linear
      - supabase
      - posthog
      - sanity
      - zapier
      # Infrastructure / fintech
      - ramp
      - moderntreasury
      - vanta
      - snowflake
      - fullstory
      - hackerone
      # Other
      - deel
      - lemonade
      - gorgias
      - uipath
      - deliveroo
      - hopper
      - sequoia
      - signalfire
      - magicschool
