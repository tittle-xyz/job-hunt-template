version: 2
updates:
  # Three dependencies and a couple of actions. Monthly is plenty — this is a tool
  # you run on your laptop, not a service.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
