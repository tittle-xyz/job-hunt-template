name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens (and keeps updating) a release PR from the conventional commits on main.
  # Merging it tags the release and writes the changelog.
  #
  # Worth knowing if you protect main, as this repo does: ci.yml does run on the
  # release PR, but GitHub holds those runs as `action_required` — workflow runs
  # from a first-time contributor need approving, and github-actions[bot] counts as
  # one. So required checks sit pending until someone clicks approve (or the run is
  # approved via the API), and only then can the PR merge.
  #
  # That's the accepted cost. The alternative is a PAT to create, scope, and rotate
  # in every repo made from this template — a worse deal than approving a run on a
  # PR that only touches CHANGELOG.md and a version string, code CI already vetted
  # on main.
  #
  # None of this bites unless you protect main. A fresh repo from this template
  # merges release PRs normally.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Refresh the readiness badge on the release PR, so the badge in the README
  # tracks releases instead of being remembered by hand.
  #
  # It lands here rather than on main for two reasons, both load-bearing:
  #
  #   main is protected and the Actions bot isn't an admin, so CI cannot push to
  #   it. A release-please PR branch is not protected, so this can.
  #
  #   The toaster-ready action's own `badge:` input runs `toaster check --offline`.
  #   Offline means no GitHub API, which means the "latest CI run green" signal
  #   reads no-data and the score drops ~6 points — a badge saying 88 on a repo
  #   that scores 94. So call the binary directly, with a token in the
  #   environment, and let the API signals resolve.
  badge:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}
          fetch-depth: 0  # full history for git-based signals

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install toaster
        run: go install github.com/tittle-xyz/toaster-ready/cmd/toaster@latest

      # This wait is the whole reason the badge is trustworthy.
      #
      # toaster scores "latest CI run green" by asking the API about the DEFAULT
      # branch's most recent run. ci.yml and release-please.yml both trigger on the
      # same push to main, so they race — and the first attempt at this scored while
      # ci was still in progress, read the run as not-green, and wrote a badge saying
      # 88 for a repo that scores 94. The badge was wrong in exactly the way this job
      # exists to prevent.
      - name: Wait for CI on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 40); do
            conclusion=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=ci.yml \
              --commit "$GITHUB_SHA" --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')
            case "$conclusion" in
              success)  echo "ci green on $GITHUB_SHA"; exit 0 ;;
              pending|"") echo "waiting for ci ($i/40)..."; sleep 15 ;;
              *)        echo "ci concluded '$conclusion' — not refreshing the badge"; exit 1 ;;
            esac
          done
          echo "timed out waiting for ci"; exit 1

      # Scores the repo by slug, which clones and scores the default branch —
      # NOT the release branch we're standing on.
      #
      # That distinction is worth 3 points and took a wrong badge to find. One of
      # toaster's signals is instructions freshness: what fraction of source commits
      # postdate the last CLAUDE.md update. The release branch carries two extra
      # commits (the release chore, and this badge) that tip the ratio past its
      # threshold — 10 of 19 rather than 8 of 17. So the branch scores 90.5 while the
      # repo it describes scores 93.5. The badge is a claim about the repo, so score
      # the repo.
      - name: Refresh readiness badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          toaster check "$GITHUB_REPOSITORY" --format svg > docs/badge.svg
          grep -o 'aria-label="[^"]*"' docs/badge.svg | head -1

      - name: Commit if it moved
        run: |
          if git diff --quiet docs/badge.svg; then
            echo "badge unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/badge.svg
          git commit -m "chore: refresh readiness badge"
          git push
