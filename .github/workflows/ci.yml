name: ci

on:
  push:
    branches: [main]
  pull_request:
  # A template nobody has touched in months should still be known-good on the day
  # a friend clones it.
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # Installed so the PDF path is genuinely exercised somewhere. Without it the
      # rendering tests skip, and "the resume builds" is the whole point of the tool.
      - name: Install typst
        uses: typst-community/setup-typst@v5

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: python -m pyflakes job_hunt scripts tests

      - name: Test
        run: python -m pytest --cov --cov-report=term
        # No secrets are provided on purpose. The suite must pass with no API
        # keys, no network, and no profile/ — the state a fresh clone is in.
        #
        # Coverage is reported, not gated. A number that must go up forever gets
        # gamed with tests nobody reads; this is here to show what isn't exercised.

      - name: The example must build a real resume
        run: |
          python scripts/init.py --no-input --name "CI Smoke Test" --email ci@example.com
          python -m job_hunt resume platform
          test -f resumes/tailored/ci_smoke_test_senior_platform_engineer.pdf

  # Ramp-up readiness, scored by tittle-xyz/toaster-ready. A template that's hard
  # to start in has failed at the one job it has, so this gates rather than
  # reports. No badge on purpose: the org gates and doesn't badge — not even
  # toaster-ready badges itself — and a badge would have to auto-commit to main,
  # which is protected.
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history for git-based signals
      - name: Gate ramp-up readiness (toaster-ready)
        uses: tittle-xyz/toaster-ready@v0
        with:
          min: 85  # a template should model the "exemplary" band, not just clear the bar

  # init runs before `make install`, on whatever python the machine has. macOS
  # still ships 3.9, so that's the floor it has to clear — the rest of the tool
  # needs 3.11+, but the script that sets you up cannot.
  init-on-old-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: init.py must run with no dependencies installed
        run: |
          python scripts/init.py --dry-run --no-input --name "Old Python"
          python scripts/init.py --no-input --name "Old Python" --email old@example.com
          grep -q "Old Python" profile/profile.yaml
